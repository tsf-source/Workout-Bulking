<style>
:root{
  --bg:#121316; --surface:#1B1D22; --surface-hi:#25282F; --line:#31343C;
  --text:#EDEBE4; --text-dim:#9A9CA6; --text-faint:#6B6E77;
  --legs:#E4572E; --chest:#3E8FD0; --back:#4C9A6B; --shoulders:#D4A24C;
  --arms:#A56CC1; --core:#C4485C; --cardio:#7A7D87;
  --up:#5CB37A; --down:#D9694F;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#121316;min-height:100vh;}
body,.wrap{font-family:'Inter',system-ui,sans-serif;}
h1,h2,.exname{font-family:'Bebas Neue',system-ui,sans-serif;letter-spacing:0.02em;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
::-webkit-scrollbar{display:none;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

<div class="wrap" style="background:var(--bg);color:var(--text);padding:16px 16px 40px;max-width:600px;width:100%;margin:0 auto;min-height:100vh;">

  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;">
    <div>
      <div style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.12em;">Personal plan</div>
      <h1 style="font-size:28px;margin:0;line-height:1;">BULKING</h1>
    </div>
    <div id="weekRing" style="text-align:right;"></div>
  </div>

  <div id="weekStrip" style="display:flex;gap:6px;margin-bottom:16px;"></div>

  <div id="dayTabs" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-ms-overflow-style:none;scrollbar-width:none;"></div>

  <div id="sessionHeader" style="margin-bottom:10px;"></div>

  <textarea id="sessionNote" rows="1" placeholder="Add a note for today's session (energy, soreness, gym conditions...)" style="width:100%;background:var(--surface);border:0.5px solid var(--line);border-radius:10px;color:var(--text);font-size:12px;padding:8px 10px;margin-bottom:12px;resize:vertical;min-height:34px;font-family:'Inter',system-ui,sans-serif;"></textarea>

  <div id="exerciseList" style="display:flex;flex-direction:column;gap:10px;"></div>

  <div style="margin-top:18px;padding-top:14px;border-top:0.5px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px;">
    <div style="font-size:12px;color:var(--text-faint);">Log actual reps and weight per set. Weight carries forward until updated.</div>
    <button id="resetBtn" style="background:transparent;border:0.5px solid var(--line);color:var(--text-dim);font-size:12px;padding:6px 10px;border-radius:8px;flex:0 0 auto;">Reset today</button>
  </div>
</div>

function sessionLeaves(s){
  let leaves=[];
  s.items.forEach(it=>{
    if(it.type==='single') leaves.push(it.ex);
    else leaves.push(...it.subs);
  });
  leaves.push(...getCustomList(s.id));
  return leaves;
}

function getCustomList(sessionId){
  if(!data.customExercises) data.customExercises = {};
  if(!data.customExercises[sessionId]) data.customExercises[sessionId] = [];
  return data.customExercises[sessionId];
}

const todayStr = new Date().toISOString().slice(0,10);

function last7Days(){
  const days=[];
  const now = new Date();
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - now.getDay());
  for(let i=0;i<7;i++){
    const d = new Date(sunday);
    d.setDate(sunday.getDate()+i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}

async function loadData(){
  try{
    const raw = localStorage.getItem('workout-data');
    if(raw){ data = JSON.parse(raw); }
  }catch(e){}
  if(!data.progress) data.progress = {};
  if(!data.swaps) data.swaps = {};
  if(!data.removed) data.removed = {};
  if(!data.customExercises) data.customExercises = {};
  render();
}
async function saveData(){
  try{ localStorage.setItem('workout-data', JSON.stringify(data)); }catch(e){}
}

function blankSetEntry(ex){
  return ex.timed ? {duration:null} : {reps:null};
}
function getDateRecord(sessionId, dateStr){
  data.progress[sessionId] = data.progress[sessionId] || {};
  data.progress[sessionId][dateStr] = data.progress[sessionId][dateStr] || {};
  return data.progress[sessionId][dateStr];
}
function getExRecord(sessionId, dateStr, ex){
  const rec = getDateRecord(sessionId, dateStr);
  if(!rec[ex.id]){ rec[ex.id] = {sets:[], weight:null}; }
  const r = rec[ex.id];
  if(!Array.isArray(r.sets)) r.sets = [];
  while(r.sets.length < ex.sets){ r.sets.push(blankSetEntry(ex)); }
  r.sets = r.sets.map(entry=>{
    if(entry==null) return blankSetEntry(ex);
    if(typeof entry === 'boolean'){ return blankSetEntry(ex); }
    if(ex.timed && entry.done!==undefined && entry.duration===undefined){ return {duration: entry.done? ex.target : null}; }
    return entry;
  });
  if(r.weight===undefined) r.weight = null;
  return r;
}

function prevWeightFor(sessionId, exId){
  const map = data.progress[sessionId] || {};
  const dates = Object.keys(map).filter(d=> d!==todayStr).sort().reverse();
  for(const d of dates){
    const rec = map[d][exId];
    if(rec && rec.weight!=null && rec.weight!==''){ return {weight:rec.weight, date:d}; }
  }
  return null;
}

function completionCount(rec, ex){
  let done=0;
  rec.sets.slice(0, ex.sets).forEach(entry=>{
    if(ex.timed){ if(entry.duration!=null && entry.duration!=='' && entry.duration>0) done++; }
    else { if(entry.reps!=null && entry.reps!=='' && entry.reps>0) done++; }
  });
  return done;
}

function sessionCompletionForDate(sessionId, dateStr){
  const session = SESSIONS.find(s=>s.id===sessionId);
  const prog = (data.progress[sessionId] && data.progress[sessionId][dateStr]) || {};
  let totalSets=0, doneSets=0;
  sessionLeaves(session).forEach(ex=>{
    if(data.removed[sessionId+'-'+ex.id]) return;
    totalSets += ex.sets;
    const rec = prog[ex.id];
    if(rec) doneSets += completionCount(rec, ex);
  });
  return totalSets? doneSets/totalSets : 0;
}

function weekSummary(){
  const days = last7Days();
  let anyComplete = 0;
  days.forEach(d=>{
    let done = SESSIONS.some(s=> sessionCompletionForDate(s.id,d) >= 0.8 );
    if(done) anyComplete++;
  });
  return {days, anyComplete};
}

function weightBadge(sessionId, ex){
  const prev = prevWeightFor(sessionId, ex.id);
  const rec = getExRecord(sessionId, todayStr, ex);
  if(rec.weight==null || rec.weight===''){
    return prev ? '<span style="font-size:11px;color:var(--text-faint);">last: '+prev.weight+' lbs</span>' : '<span style="font-size:11px;color:var(--text-faint);">first time logging</span>';
  }
  if(!prev){
    return '<span style="font-size:11px;color:var(--text-faint);">first time logging</span>';
  }
  const diff = rec.weight - prev.weight;
  if(diff===0){
    return '<span style="font-size:11px;color:var(--text-faint);">same as last time ('+prev.weight+' lbs)</span>';
  }
  const up = diff>0;
  return '<span style="font-size:11px;color:'+(up?'var(--up)':'var(--down)')+';display:inline-flex;align-items:center;gap:2px;"><i class="ti ti-arrow-'+(up?'up':'down')+'" style="font-size:12px;"></i>'+(up?'+':'')+diff+' lbs vs '+prev.weight+' lbs last time</span>';
}

function renderExercises(){
  const s = SESSIONS.find(x=>x.id===currentSession);
  let carriedAny = false;
  sessionLeaves(s).forEach(ex=>{
    const rec = getExRecord(s.id, todayStr, ex);
    if(ex.w && (rec.weight==null || rec.weight==='')){
      const prev = prevWeightFor(s.id, ex.id);
      if(prev){ rec.weight = prev.weight; carriedAny = true; }
    }
  });
  if(carriedAny) saveData();

  let html='';
  s.items.forEach(item=>{
    if(item.type==='single'){
      if(data.removed[s.id+'-'+item.ex.id]) return;
      html += leafCardHTML(s.id, item.ex, 'var(--surface)');
    } else {
      const visibleSubs = item.subs.filter(sub=> !data.removed[s.id+'-'+sub.id]);
      if(visibleSubs.length===0) return;
      const muscles = [...new Set(visibleSubs.map(x=>x.muscle))];
      const dots = muscles.map(m=>'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--'+m+');"></span>').join('');
      let subHtml='';
      visibleSubs.forEach(sub=>{ subHtml += leafCardHTML(s.id, sub, 'var(--surface-hi)'); });
      html += '<div style="background:var(--surface);border-radius:12px;padding:10px;border:1px dashed var(--line);">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:0 2px;">'+
          '<i class="ti ti-repeat" style="font-size:13px;color:var(--text-dim);"></i>'+
          '<span style="font-size:11px;font-weight:600;letter-spacing:0.06em;color:var(--text-dim);text-transform:uppercase;">Superset &middot; '+item.rounds+' rounds</span>'+
          '<span style="margin-left:auto;display:flex;gap:4px;">'+dots+'</span>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px;">'+subHtml+'</div>'+
      '</div>';
    }
  });

  getCustomList(s.id).forEach(ex=>{
    if(data.removed[s.id+'-'+ex.id]) return;
    html += leafCardHTML(s.id, ex, 'var(--surface)');
  });

  html += '<button id="addExerciseBtn" style="background:transparent;border:1.5px dashed var(--line);color:var(--text-dim);font-size:13px;padding:12px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px;"><i class="ti ti-plus" style="font-size:15px;"></i>Add exercise</button>';

  const removedInSession = sessionLeaves(s).filter(ex=> data.removed[s.id+'-'+ex.id]);
  if(removedInSession.length){
    html += '<div style="background:var(--surface);border-radius:12px;padding:10px;border:0.5px dashed var(--line);">'+
      '<div style="font-size:11px;color:var(--text-faint);margin-bottom:6px;">Removed from this session</div>'+
      '<div style="display:flex;flex-direction:column;gap:6px;">'+
      removedInSession.map(ex=>
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">'+
          '<span style="font-size:12px;color:var(--text-dim);">'+((data.swaps[s.id+'-'+ex.id])||ex.name)+'</span>'+
          '<button data-unremove="'+s.id+'-'+ex.id+'" style="background:transparent;border:0.5px solid var(--line);color:var(--text-dim);font-size:11px;padding:4px 8px;border-radius:8px;">Restore</button>'+
        '</div>'
      ).join('')+
      '</div>'+
    '</div>';
  }
  document.getElementById('exerciseList').innerHTML = html;

  document.querySelectorAll('[data-unremove]').forEach(b=>{
    b.onclick = async ()=>{
      delete data.removed[b.dataset.unremove];
      await saveData(); render();
    };
  });
  document.getElementById('addExerciseBtn').onclick = ()=> openAddExerciseForm(s.id);

  document.querySelectorAll('[data-duration]').forEach(inp=>{
    inp.onchange = async ()=>{
      const exId = inp.dataset.duration, idx = parseInt(inp.dataset.idx);
      const rec = getDateRecord(currentSession, todayStr)[exId];
      const val = inp.value==='' ? null : parseFloat(inp.value);
      rec.sets[idx].duration = val;
      await saveData();
      render();
    };
  });
  document.querySelectorAll('[data-reps]').forEach(inp=>{
    inp.onchange = async ()=>{
      const exId = inp.dataset.reps, idx = parseInt(inp.dataset.idx);
      const rec = getDateRecord(currentSession, todayStr)[exId];
      const val = inp.value==='' ? null : parseInt(inp.value);
      rec.sets[idx].reps = val;
      await saveData();
      render();
    };
  });
  document.querySelectorAll('[data-weight]').forEach(inp=>{
    inp.onchange = async ()=>{
      const exId = inp.dataset.weight;
      const rec = getDateRecord(currentSession, todayStr)[exId];
      const val = inp.value==='' ? null : parseFloat(inp.value);
      rec.weight = val;
      await saveData();
      render();
    };
  });
  document.querySelectorAll('[data-addset]').forEach(btn=>{

      const exId = btn.dataset.addset;

      const rec = getDateRecord(currentSession, todayStr)[exId];
      rec.sets.push(blankSetEntry(ex));
      await saveData();
      render();
    };
  });
  document.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.onclick = async ()=>{
      const exId = btn.dataset.remove, idx = parseInt(btn.dataset.idx);
      const rec = getDateRecord(currentSession, todayStr)[exId];
      rec.sets.splice(idx,1);
      await saveData();
      render();
    };
  });
  document.querySelectorAll('[data-swap]').forEach(btn=>{

  document.querySelectorAll('[data-note]').forEach(ta=>{
    ta.onchange = async ()=>{
      const exId = ta.dataset.note;
      const rec = getDateRecord(currentSession, todayStr)[exId];
      rec.userNote = ta.value;
      await saveData();
    };
  });
}

        '<div style="flex:1;" id="addRepsWrap">'+
          '<label style="font-size:11px;color:var(--text-faint);display:block;margin-bottom:4px;">Target reps</label>'+
          '<input id="addReps" type="text" placeholder="e.g. 10 or 8-12" style="width:100%;height:36px;background:var(--surface-hi);border:0.5px solid var(--line);border-radius:8px;color:var(--text);font-size:13px;padding:0 8px;">'+
        '</div>'+
        '<div style="flex:1;display:none;" id="addDurationWrap">'+
          '<label style="font-size:11px;color:var(--text-faint);display:block;margin-bottom:4px;">Target duration</label>'+
          '<div style="display:flex;gap:6px;">'+
            '<input id="addDuration" type="number" value="10" min="1" style="width:100%;height:36px;background:var(--surface-hi);border:0.5px solid var(--line);border-radius:8px;color:var(--text);font-size:13px;padding:0 8px;">'+
            '<select id="addUnit" style="height:36px;background:var(--surface-hi);border:0.5px solid var(--line);border-radius:8px;color:var(--text);font-size:13px;"><option value="min">min</option><option value="sec">sec</option></select>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;gap:16px;">'+
        '<label style="font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px;"><input id="addTimed" type="checkbox">This is time-based (cardio, plank...)</label>'+
      '</div>'+
      '<div>'+
        '<label style="font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px;"><input id="addWeight" type="checkbox">Track weight for this exercise</label>'+
      '</div>'+
      '<div>'+
        '<label style="font-size:11px;color:var(--text-faint);display:block;margin-bottom:4px;">Notes (optional)</label>'+
        '<textarea id="addNotes" rows="2" placeholder="Form cues, equipment, anything to remember" style="width:100%;background:var(--surface-hi);border:0.5px solid var(--line);border-radius:8px;color:var(--text);font-size:12px;padding:6px 8px;resize:vertical;font-family:'+"'"+'Inter'+"'"+',system-ui,sans-serif;"></textarea>'+
      '</div>'+
      '<button id="addExSubmit" style="background:var(--legs);color:#121316;border:none;font-weight:600;font-size:14px;padding:10px;border-radius:10px;margin-top:4px;">Add to this session</button>'+
    '</div>'+
  '</div>';
  document.body.appendChild(overlay);
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  document.getElementById('addExClose').onclick = ()=> overlay.remove();

  document.getElementById('addDbPick').onchange = (e)=>{
    const v = e.target.value;
    if(!v) return;
    const [m,name] = v.split('|||');
    document.getElementById('addName').value = name;
    document.getElementById('addMuscle').value = m;
  };
  document.getElementById('addTimed').onchange = (e)=>{
    document.getElementById('addRepsWrap').style.display = e.target.checked ? 'none' : 'block';
    document.getElementById('addDurationWrap').style.display = e.target.checked ? 'block' : 'none';
  };

  document.getElementById('addExSubmit').onclick = async ()=>{
    const name = document.getElementById('addName').value.trim();
    if(!name){ document.getElementById('addName').style.borderColor = 'var(--down)'; return; }
    const muscle = document.getElementById('addMuscle').value;
    const sets = Math.max(1, parseInt(document.getElementById('addSets').value)||1);
    const timed = document.getElementById('addTimed').checked;
    const trackWeight = document.getElementById('addWeight').checked;
    const notes = document.getElementById('addNotes').value.trim();
    const ex = { id: 'c'+Date.now(), name, muscle, sets, w: trackWeight };
    if(timed){
      ex.timed = true;
      ex.target = Math.max(1, parseFloat(document.getElementById('addDuration').value)||10);
      ex.unit = document.getElementById('addUnit').value;
    } else {
      ex.reps = document.getElementById('addReps').value.trim() || '10';
    }
    if(notes) ex.note = notes;
    getCustomList(sessionId).push(ex);
    await saveData();
    overlay.remove();
    render();
  };
}

let openSwapKey = null;
function openSwapMenu(key, muscle, orig){
  const existing = document.getElementById('swapMenu');
  if(existing) existing.remove();
  if(openSwapKey===key){ openSwapKey=null; return; }
  openSwapKey = key;
  const opts = (MUSCLE_ALTS[muscle]||[]).filter(o=>o!==orig);
  let html = '<div id="swapMenu" style="position:relative;background:var(--surface-hi);border-radius:10px;padding:10px;margin-top:-4px;margin-bottom:10px;border:0.5px solid var(--line);">'+
    '<div style="font-size:11px;color:var(--text-faint);margin-bottom:6px;">Swap for an alternative '+MUSCLE_LABELS[muscle]+' exercise</div>'+
    '<div style="display:flex;flex-direction:column;gap:6px;">'+
    '<button data-restore="'+key+'" style="text-align:left;background:transparent;border:0.5px solid var(--line);color:var(--text);font-size:13px;padding:7px 10px;border-radius:8px;">'+orig+' (original)</button>';
  opts.forEach(o=>{
    html += '<button data-choose="'+key+'" data-name="'+o+'" style="text-align:left;background:transparent;border:0.5px solid var(--line);color:var(--text);font-size:13px;padding:7px 10px;border-radius:8px;">'+o+'</button>';
  });
  html += '<button data-remove-ex="'+key+'" style="text-align:left;background:transparent;border:0.5px solid var(--down);color:var(--down);font-size:13px;padding:7px 10px;border-radius:8px;margin-top:2px;display:flex;align-items:center;gap:6px;"><i class="ti ti-trash" style="font-size:14px;"></i>Remove this exercise from my plan</button>';
  html += '</div></div>';
  const btn = document.querySelector('[data-swap="'+key+'"]');
  const card = btn.closest('div[style*="border-left"]');
  card.insertAdjacentHTML('afterend', html);
  document.querySelectorAll('[data-choose]').forEach(b=>{
    b.onclick = async ()=>{
      data.swaps[b.dataset.choose] = b.dataset.name;
      openSwapKey=null;
      await saveData(); render();
    };
  });
  document.querySelectorAll('[data-restore]').forEach(b=>{
    b.onclick = async ()=>{
      delete data.swaps[b.dataset.restore];
      openSwapKey=null;
      await saveData(); render();
    };
  });
  document.querySelectorAll('[data-remove-ex]').forEach(b=>{
    b.onclick = async ()=>{
      data.removed[b.dataset.removeEx] = true;
      openSwapKey=null;
      await saveData(); render();
    };
  });
}

document.getElementById('resetBtn').onclick = async ()=>{
  const s = SESSIONS.find(x=>x.id===currentSession);
  const rec = getDateRecord(currentSession, todayStr);
  sessionLeaves(s).forEach(ex=>{
    if(rec[ex.id]) rec[ex.id].sets = rec[ex.id].sets.slice(0, ex.sets).map(()=> blankSetEntry(ex));
  });
  await saveData(); render();
};

function render(){
  renderWeekRing();
  renderWeekStrip();
  renderDayTabs();
  renderSessionHeader();
  renderSessionNote();
  renderExercises();
}

loadData();
</script>
